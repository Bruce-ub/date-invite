<!DOCTYPE html>
<html>
<head>
<title>Date Invite ❤️</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  margin-top: 80px;
  background: linear-gradient(135deg, #fff0f5, #ffe4e1);
  overflow: hidden;
  transition: all 1s ease;
}

h1 {
  font-size: 42px;
  color: #ff3366;
  animation: fadeIn 2s ease;
}

h2 {
  font-size: 28px;
  animation: fadeIn 3s ease;
}

button {
  padding: 15px 25px;
  font-size: 22px;
  margin: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

#yesBtn {
  background-color: #ff4d6d;
  color: white;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
}

#yesBtn:hover {
  transform: scale(1.1);
}

#noBtn {
  background-color: gray;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

/* Explosion hearts */
.explode {
  position: absolute;
  font-size: 24px;
  animation: explode 1.5s forwards;
}

@keyframes explode {
  0% {
    transform: scale(0);
    opacity: 1;
  }
  100% {
    transform: translateY(-200px) scale(2);
    opacity: 0;
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.success {
  animation: zoomIn 1s ease;
}

@keyframes zoomIn {
  from {
    transform: scale(0.5);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

</style>
</head>

<body>

<h1>Hey Lais ❤️</h1>
<h2>Will you join me on a date night this Saturday?</h2>

<button id="yesBtn">Yes 😊</button>
<button id="noBtn">No 😢</button>

<audio id="music" src="song.mp3" preload="auto"></audio>

<script>

let yesSize = 22;
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("music");


// Make NO impossible to click
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const distanceX = Math.abs(e.clientX - (rect.left + rect.width/2));
  const distanceY = Math.abs(e.clientY - (rect.top + rect.height/2));

  if (distanceX < 120 && distanceY < 80) {

    const newX = Math.random() * (window.innerWidth - 100);
    const newY = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "absolute";
    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";

    yesSize += 5;
    yesBtn.style.fontSize = yesSize + "px";
  }
});


// YES clicked
yesBtn.addEventListener("click", () => {

  // Play music
  music.play();

  // Change background
  document.body.style.background =
    "linear-gradient(135deg, #ff758c, #ff7eb3)";

  // Explosion hearts
  for(let i=0;i<40;i++){
    const heart = document.createElement("div");
    heart.className = "explode";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.top = Math.random()*100 + "vh";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 1500);
  }

  // Final message
  setTimeout(() => {

  document.querySelector("h1").innerHTML = "YAY Laiss!!! ❤️";
  document.querySelector("h2").innerHTML = "I just wanna thank ya 😄";

  yesBtn.style.display = "none";
  noBtn.style.display = "none";

  const msg = document.createElement("div");
  msg.className = "success";
  msg.innerHTML = `
    <h3>I miss you and love you</h3>
    <p style="font-size:24px;">
      You are the cutest boy ever 💖
    </p>
  `;

  document.body.appendChild(msg);

}, 800);
});


// Floating hearts always
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
